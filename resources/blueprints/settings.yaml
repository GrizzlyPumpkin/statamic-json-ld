tabs:
    general:
        display: General
        sections:
            -   fields:
                    -   handle: enabled
                        field:
                            type: toggle
                            display: Enabled
                            default: true
                    -   handle: site_url
                        field:
                            type: text
                            display: Site URL
                            instructions: Leave empty to use the app URL.
                    -   handle: include_global_schema
                        field:
                            type: toggle
                            display: Include Global Schema by Default
                            default: true
                    -   handle: include_breadcrumb_schema
                        field:
                            type: toggle
                            display: Include Breadcrumb Schema
                            instructions: Automatically render BreadcrumbList schema for entries in structured collections.
                            default: false
                    -   handle: pretty_print
                        field:
                            type: toggle
                            display: Pretty Print JSON
                            default: false
    global_schema:
        display: Global Schema
        sections:
            -   fields:
                    -   handle: global_schema
                        field:
                            type: replicator
                            display: Global Schema
